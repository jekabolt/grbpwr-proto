syntax = "proto3";

package common;

import "common/buyer.proto";
import "common/language.proto";
import "common/payment.proto";
import "common/promo.proto";
import "common/shipment.proto";
import "google/protobuf/timestamp.proto";
import "google/type/decimal.proto";

option go_package = "github.com/jekabolt/grbpwr-manager/proto/gen/common;common";

message OrderNew {
  repeated OrderItemInsert items = 1;
  AddressInsert shipping_address = 2;
  AddressInsert billing_address = 3;
  BuyerInsert buyer = 4;
  common.PaymentMethodNameEnum payment_method = 5;
  int32 shipment_carrier_id = 6;
  string promo_code = 7;
  string currency = 8; // ISO 4217 currency code (e.g., USD, EUR, JPY, CNY, KRW)
}

message OrderFull {
  Order order = 1;
  repeated OrderItem order_items = 2;
  repeated OrderItem refunded_order_items = 3;
  Payment payment = 4;
  Shipment shipment = 5;
  PromoCode promo_code = 6;
  Buyer buyer = 7;
  Address billing = 8;
  Address shipping = 9;
  repeated OrderStatusHistory status_history = 10;
}

message Order {
  int32 id = 1;
  string uuid = 2;
  google.protobuf.Timestamp placed = 3;
  google.protobuf.Timestamp modified = 4;
  google.type.Decimal total_price = 5;
  string currency = 6; // ISO 4217 currency code (e.g., USD, EUR, JPY, CNY, KRW)
  int32 order_status_id = 7;
  int32 promo_id = 8;
  string refund_reason = 9;
  string order_comment = 10;
  google.type.Decimal refunded_amount = 11;
}

message OrderItem {
  int32 id = 1;
  int32 order_id = 2;
  string thumbnail = 3;
  string blurhash = 4;
  string product_price = 5;
  string product_price_with_sale = 6;
  string product_sale_percentage = 7;
  string product_brand = 8;
  string slug = 9;
  string color = 10;
  int32 top_category_id = 11;
  int32 sub_category_id = 12;
  int32 type_id = 13;
  string sku = 14;
  google.protobuf.Timestamp preorder = 15;
  OrderItemInsert order_item = 16;
  repeated ProductInsertTranslation translations = 17;
}

message OrderItemInsert {
  int32 product_id = 1;
  int32 quantity = 2;
  int32 size_id = 3;
}

// CustomOrderItemInsert allows custom pricing per item (admin-only).
message CustomOrderItemInsert {
  int32 product_id = 1;
  int32 quantity = 2;
  int32 size_id = 3;
  google.type.Decimal custom_price = 4; // override catalog price
}

enum OrderItemAdjustmentReasonEnum {
  ORDER_ITEM_ADJUSTMENT_REASON_ENUM_UNKNOWN = 0;
  ORDER_ITEM_ADJUSTMENT_REASON_ENUM_OUT_OF_STOCK = 1;
  ORDER_ITEM_ADJUSTMENT_REASON_ENUM_QUANTITY_REDUCED = 2;
  ORDER_ITEM_ADJUSTMENT_REASON_ENUM_QUANTITY_CAPPED = 3;
}

// OrderItemAdjustment describes a change made during order item validation.
message OrderItemAdjustment {
  int32 product_id = 1;
  int32 size_id = 2;
  google.type.Decimal requested_quantity = 3;
  google.type.Decimal adjusted_quantity = 4; // 0 means item was removed
  OrderItemAdjustmentReasonEnum reason = 5;
}

enum OrderStatusEnum {
  ORDER_STATUS_ENUM_UNKNOWN = 0;
  ORDER_STATUS_ENUM_PLACED = 1;
  ORDER_STATUS_ENUM_AWAITING_PAYMENT = 2;
  ORDER_STATUS_ENUM_CONFIRMED = 3;
  ORDER_STATUS_ENUM_SHIPPED = 4;
  ORDER_STATUS_ENUM_DELIVERED = 5;
  ORDER_STATUS_ENUM_CANCELLED = 6;
  ORDER_STATUS_ENUM_PENDING_RETURN = 7;
  ORDER_STATUS_ENUM_REFUND_IN_PROGRESS = 8;
  ORDER_STATUS_ENUM_REFUNDED = 9;
  ORDER_STATUS_ENUM_PARTIALLY_REFUNDED = 10;
}

message OrderStatus {
  int32 id = 1;
  OrderStatusEnum name = 2;
}

message OrderStatusHistory {
  int32 id = 1;
  int32 order_id = 2;
  OrderStatusEnum status = 3;
  google.protobuf.Timestamp changed_at = 4;
  string changed_by = 5;
  string notes = 6;
}

// ==================== Review Enums ====================

enum ProductRatingEnum {
  PRODUCT_RATING_ENUM_UNKNOWN = 0;
  PRODUCT_RATING_ENUM_POOR = 1;
  PRODUCT_RATING_ENUM_FAIR = 2;
  PRODUCT_RATING_ENUM_GOOD = 3;
  PRODUCT_RATING_ENUM_VERY_GOOD = 4;
  PRODUCT_RATING_ENUM_EXCELLENT = 5;
}

enum FitScaleEnum {
  FIT_SCALE_ENUM_UNKNOWN = 0;
  FIT_SCALE_ENUM_RUNS_SMALL = 1;
  FIT_SCALE_ENUM_SLIGHTLY_SMALL = 2;
  FIT_SCALE_ENUM_TRUE_TO_SIZE = 3;
  FIT_SCALE_ENUM_SLIGHTLY_LARGE = 4;
  FIT_SCALE_ENUM_RUNS_LARGE = 5;
}

enum DeliverySpeedEnum {
  DELIVERY_SPEED_ENUM_UNKNOWN = 0;
  DELIVERY_SPEED_ENUM_MUCH_FASTER_THAN_EXPECTED = 1;
  DELIVERY_SPEED_ENUM_FASTER_THAN_EXPECTED = 2;
  DELIVERY_SPEED_ENUM_AS_EXPECTED = 3;
  DELIVERY_SPEED_ENUM_SLOWER_THAN_EXPECTED = 4;
  DELIVERY_SPEED_ENUM_MUCH_SLOWER_THAN_EXPECTED = 5;
}

enum PackagingConditionEnum {
  PACKAGING_CONDITION_ENUM_UNKNOWN = 0;
  PACKAGING_CONDITION_ENUM_DAMAGED = 1;
  PACKAGING_CONDITION_ENUM_ACCEPTABLE = 2;
  PACKAGING_CONDITION_ENUM_GOOD = 3;
  PACKAGING_CONDITION_ENUM_EXCELLENT = 4;
}

// ==================== Review Messages ====================

// Order-level review (delivery & packaging)
message OrderReview {
  int32 id = 1;
  int32 order_id = 2;
  DeliverySpeedEnum delivery_rating = 3;
  PackagingConditionEnum packaging_rating = 4;
  google.protobuf.Timestamp created_at = 5;
}

message OrderReviewInsert {
  DeliverySpeedEnum delivery_rating = 1;
  PackagingConditionEnum packaging_rating = 2;
}

// Item-level review (product rating, fit, recommendation, text)
message OrderItemReview {
  int32 id = 1;
  int32 order_item_id = 2;
  ProductRatingEnum rating = 3;
  FitScaleEnum fit_rating = 4;
  bool recommend = 5;
  string text = 6;
  google.protobuf.Timestamp created_at = 7;
}

message OrderItemReviewInsert {
  int32 order_item_id = 1;
  ProductRatingEnum rating = 2;
  FitScaleEnum fit_rating = 3;
  bool recommend = 4;
  string text = 5;
}

// Combined review for an order (order-level + item-level)
message OrderReviewFull {
  OrderReview order_review = 1;
  repeated OrderItemReview item_reviews = 2;
}
