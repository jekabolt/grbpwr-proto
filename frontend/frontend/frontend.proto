syntax = "proto3";

package frontend;

import "common/archive.proto";
import "common/dict.proto";
import "common/filter.proto";
import "common/hero.proto";
import "common/order.proto";
import "common/payment.proto";
import "common/product.proto";
import "common/promo.proto";
import "common/support.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/type/date.proto";
import "google/type/decimal.proto";

option go_package = "github.com/jekabolt/grbpwr-products-manager/proto/frontend;frontend";

service FrontendService {
  // Get hero information
  rpc GetHero(GetHeroRequest) returns (GetHeroResponse) {
    option (google.api.http) = {get: "/api/frontend/hero"};
  }

  // Get product brand and name
  rpc GetProduct(GetProductRequest) returns (GetProductResponse) {
    option (google.api.http) = {get: "/api/frontend/product/{gender}/{brand}/{name}/{id}"};
  }

  // Get paged products
  rpc GetProductsPaged(GetProductsPagedRequest) returns (GetProductsPagedResponse) {
    option (google.api.http) = {get: "/api/frontend/products/paged"};
  }

  // Submit an order
  rpc SubmitOrder(SubmitOrderRequest) returns (SubmitOrderResponse) {
    option (google.api.http) = {
      post: "/api/frontend/order/new"
      body: "*"
    };
  }

  // Retrieves an order by its ID
  rpc GetOrderByUUIDAndEmail(GetOrderByUUIDAndEmailRequest) returns (GetOrderByUUIDAndEmailResponse) {
    option (google.api.http) = {get: "/api/frontend/order/{order_uuid}/{b64_email}"};
  }

  rpc ValidateOrderItemsInsert(ValidateOrderItemsInsertRequest) returns (ValidateOrderItemsInsertResponse) {
    option (google.api.http) = {
      post: "/api/frontend/orders/validate-items"
      body: "*"
    };
  }

  rpc ValidateOrderByUUID(ValidateOrderByUUIDRequest) returns (ValidateOrderByUUIDResponse) {
    option (google.api.http) = {
      post: "/api/frontend/orders/validate/{order_uuid}"
      body: "*"
    };
  }

  // Generate an invoice for the order or return the existing one
  rpc GetOrderInvoice(GetOrderInvoiceRequest) returns (GetOrderInvoiceResponse) {
    option (google.api.http) = {
      post: "/api/frontend/order/{order_uuid}/{payment_method}/invoice"
      body: "*"
    };
  }

  // Cancel an invoice for the order
  rpc CancelOrderInvoice(CancelOrderInvoiceRequest) returns (CancelOrderInvoiceResponse) {
    option (google.api.http) = {
      post: "/api/frontend/order/{order_uuid}/invoice/cancel"
      body: "*"
    };
  }

  // Cancel order by user with reason
  rpc CancelOrderByUser(CancelOrderByUserRequest) returns (CancelOrderByUserResponse) {
    option (google.api.http) = {
      post: "/api/frontend/order/{order_uuid}/{b64_email}/cancel"
      body: "*"
    };
  }

  // Subscribe to the newsletter
  rpc SubscribeNewsletter(SubscribeNewsletterRequest) returns (SubscribeNewsletterResponse) {
    option (google.api.http) = {
      post: "/api/frontend/newsletter/subscribe"
      body: "*"
    };
  }

  // Unsubscribe from the newsletter
  rpc UnsubscribeNewsletter(UnsubscribeNewsletterRequest) returns (UnsubscribeNewsletterResponse) {
    option (google.api.http) = {
      post: "/api/frontend/newsletter/unsubscribe"
      body: "*"
    };
  }

  // NotifyMe adds an email to the waitlist for a specific product/size when out of stock
  rpc NotifyMe(NotifyMeRequest) returns (NotifyMeResponse) {
    option (google.api.http) = {
      post: "/api/frontend/notify-me"
      body: "*"
    };
  }

  // GetArchivesPaged retrieves paged archives.
  rpc GetArchivesPaged(GetArchivesPagedRequest) returns (GetArchivesPagedResponse) {
    option (google.api.http) = {get: "/api/frontend/archive/paged"};
  }

  // GetArchive retrieves an archive by its heading, tag and id.
  rpc GetArchive(GetArchiveRequest) returns (GetArchiveResponse) {
    option (google.api.http) = {get: "/api/frontend/archive/{heading}/{tag}/{id}"};
  }

  // Submit a support ticket
  rpc SubmitSupportTicket(SubmitSupportTicketRequest) returns (SubmitSupportTicketResponse) {
    option (google.api.http) = {
      post: "/api/frontend/support/ticket"
      body: "*"
    };
  }

  // Submit reviews for a delivered order (order-level + per-item, requires delivered order + buyer email)
  rpc SubmitOrderReview(SubmitOrderReviewRequest) returns (SubmitOrderReviewResponse) {
    option (google.api.http) = {
      post: "/api/frontend/order/{order_uuid}/review"
      body: "*"
    };
  }

  // --- Storefront account (passwordless: OTP + magic link; access + refresh tokens) ---

  rpc RequestAccountLogin(RequestAccountLoginRequest) returns (RequestAccountLoginResponse) {
    option (google.api.http) = {
      post: "/api/frontend/account/login/request"
      body: "*"
    };
  }

  rpc VerifyAccountLoginCode(VerifyAccountLoginCodeRequest) returns (VerifyAccountLoginResponse) {
    option (google.api.http) = {
      post: "/api/frontend/account/login/verify-code"
      body: "*"
    };
  }

  rpc VerifyAccountMagicLink(VerifyAccountMagicLinkRequest) returns (VerifyAccountLoginResponse) {
    option (google.api.http) = {
      post: "/api/frontend/account/login/verify-magic"
      body: "*"
    };
  }

  rpc RefreshAccountSession(RefreshAccountSessionRequest) returns (RefreshAccountSessionResponse) {
    option (google.api.http) = {
      post: "/api/frontend/account/session/refresh"
      body: "*"
    };
  }

  // RevokeAccountSession logs out this client: invalidates the Bearer access token and revokes this refresh token's rotation family (other devices unchanged). Requires Bearer token + refresh_token.
  rpc RevokeAccountSession(RevokeAccountSessionRequest) returns (RevokeAccountSessionResponse) {
    option (google.api.http) = {
      post: "/api/frontend/account/session/revoke"
      body: "*"
    };
  }

  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse) {
    option (google.api.http) = {get: "/api/frontend/account/me"};
  }

  rpc UpdateAccount(UpdateAccountRequest) returns (UpdateAccountResponse) {
    option (google.api.http) = {
      put: "/api/frontend/account/me"
      body: "*"
    };
  }

  rpc ListSavedAddresses(ListSavedAddressesRequest) returns (ListSavedAddressesResponse) {
    option (google.api.http) = {get: "/api/frontend/account/addresses"};
  }

  rpc AddSavedAddress(AddSavedAddressRequest) returns (AddSavedAddressResponse) {
    option (google.api.http) = {
      post: "/api/frontend/account/addresses"
      body: "*"
    };
  }

  rpc UpdateSavedAddress(UpdateSavedAddressRequest) returns (UpdateSavedAddressResponse) {
    option (google.api.http) = {
      put: "/api/frontend/account/addresses/{id}"
      body: "*"
    };
  }

  rpc DeleteSavedAddress(DeleteSavedAddressRequest) returns (DeleteSavedAddressResponse) {
    option (google.api.http) = {delete: "/api/frontend/account/addresses/{id}"};
  }

  rpc SetDefaultSavedAddress(SetDefaultSavedAddressRequest) returns (SetDefaultSavedAddressResponse) {
    option (google.api.http) = {
      post: "/api/frontend/account/addresses/{id}/default"
      body: "*"
    };
  }

  rpc ListMyOrders(ListMyOrdersRequest) returns (ListMyOrdersResponse) {
    option (google.api.http) = {get: "/api/frontend/account/orders"};
  }
}

message GetHeroRequest {}
message GetHeroResponse {
  common.HeroFullWithTranslations hero = 1;
  common.Dictionary dictionary = 2;
}

message GetProductRequest {
  string gender = 1;
  string brand = 2;
  string name = 3;
  int32 id = 4;
}

message GetProductResponse {
  common.ProductFull product = 1;
}

message GetProductsPagedRequest {
  int32 limit = 1;
  int32 offset = 2;
  repeated common.SortFactor sort_factors = 3;
  common.OrderFactor order_factor = 4;
  common.FilterConditions filter_conditions = 5;
}

message GetProductsPagedResponse {
  repeated common.Product products = 1;
  int32 total = 2;
}

message SubmitOrderRequest {
  common.OrderNew order = 1;
  string payment_intent_id = 2; // optional, for pre-created PaymentIntent
  string ga_client_id = 3; // GA4 client ID from _ga cookie for server-side purchase attribution
}

message SubmitOrderResponse {
  string order_uuid = 1;
  common.OrderStatusEnum order_status = 2;
  common.PaymentInsert payment = 4;
}

message GetOrderByUUIDAndEmailRequest {
  string order_uuid = 1;
  string b64_email = 2;
}

message GetOrderByUUIDAndEmailResponse {
  common.OrderFull order = 1;
}

message ValidateOrderItemsInsertRequest {
  repeated common.OrderItemInsert items = 1;
  string promo_code = 2;
  int32 shipment_carrier_id = 3;
  string country = 4; // ISO country code for automatic_payment_methods
  common.PaymentMethodNameEnum payment_method = 5; // to determine if PaymentIntent needed
  string currency = 6; // ISO currency code (e.g., "usd", "eur")
  string idempotency_key = 7; // Optional: key from previous ValidateOrderItemsInsert response; same key = same payment session
}

message ValidateOrderItemsInsertResponse {
  repeated common.OrderItem valid_items = 1;
  bool has_changed = 2;
  google.type.Decimal subtotal = 3;
  google.type.Decimal total_sale = 4;
  common.PromoCodeInsert promo = 5;
  string client_secret = 6; // Stripe client_secret for payment element
  string payment_intent_id = 7; // Stripe PaymentIntent ID
  repeated common.OrderItemAdjustment item_adjustments = 8; // Describes quantity/availability changes
  string idempotency_key = 9; // Server-generated key for payment session; client stores and sends on subsequent requests
  bool free_shipping = 10; // True when order qualifies for complimentary shipping (subtotal >= threshold) or promo grants free shipping
  google.type.Decimal shipping_price = 11; // Effective shipping price charged (0 when free_shipping is true)
}

message ValidateOrderByUUIDRequest {
  string order_uuid = 1;
}

message ValidateOrderByUUIDResponse {
  common.OrderFull order = 1;
}

message GetOrderInvoiceRequest {
  string order_uuid = 1;
  common.PaymentMethodNameEnum payment_method = 2;
}

message GetOrderInvoiceResponse {
  google.protobuf.Timestamp expired_at = 1;
  common.PaymentInsert payment = 2;
}

message CancelOrderInvoiceRequest {
  string order_uuid = 1;
}

message CancelOrderInvoiceResponse {}

message CancelOrderByUserRequest {
  string order_uuid = 1;
  string b64_email = 2;
  string reason = 3;
}

message CancelOrderByUserResponse {
  common.OrderFull order = 1;
}

message SubscribeNewsletterRequest {
  string email = 1;
}

message SubscribeNewsletterResponse {}

message UnsubscribeNewsletterRequest {
  string email = 1;
}

message UnsubscribeNewsletterResponse {}

message NotifyMeRequest {
  string email = 1;
  int32 product_id = 2;
  int32 size_id = 3;
}

message NotifyMeResponse {}

message GetArchivesPagedRequest {
  int32 limit = 1;
  int32 offset = 2;
  common.OrderFactor order_factor = 3;
}

message GetArchivesPagedResponse {
  repeated common.ArchiveList archives = 1;
  int32 total = 2;
}

message GetArchiveRequest {
  string heading = 1;
  string tag = 2;
  int32 id = 3;
}

message GetArchiveResponse {
  common.ArchiveFull archive = 1;
}

message SubmitSupportTicketRequest {
  common.SupportTicketInsert ticket = 1;
}

message SubmitSupportTicketResponse {}

message SubmitOrderReviewRequest {
  string order_uuid = 1;
  string b64_email = 2;
  common.OrderReviewInsert order_review = 3;
  repeated common.OrderItemReviewInsert item_reviews = 4;
}

message SubmitOrderReviewResponse {}

// --- Storefront account messages ---

message RequestAccountLoginRequest {
  string email = 1;
}

message RequestAccountLoginResponse {}

message VerifyAccountLoginCodeRequest {
  string email = 1;
  string code = 2;
}

message VerifyAccountMagicLinkRequest {
  string token = 1;
}

message VerifyAccountLoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp access_expires_at = 3;
  StorefrontAccount account = 4;
}

message RefreshAccountSessionRequest {
  string refresh_token = 1;
}

message RevokeAccountSessionRequest {
  // Current opaque refresh token; its rotation family is revoked (required).
  string refresh_token = 1;
}

message RevokeAccountSessionResponse {}

message RefreshAccountSessionResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp access_expires_at = 3;
}

// Shopping preference for storefront catalog browsing (not product target_gender).
enum ShoppingPreferenceEnum {
  SHOPPING_PREFERENCE_ENUM_UNKNOWN = 0;
  SHOPPING_PREFERENCE_ENUM_MALE = 1;
  SHOPPING_PREFERENCE_ENUM_FEMALE = 2;
  SHOPPING_PREFERENCE_ENUM_ALL = 3;
}

// Account tier / membership level
enum AccountTierEnum {
  ACCOUNT_TIER_ENUM_UNKNOWN = 0;
  ACCOUNT_TIER_ENUM_PLUS = 1;
  ACCOUNT_TIER_ENUM_PLUS_PLUS = 2;
  ACCOUNT_TIER_ENUM_HACKER = 3;
  ACCOUNT_TIER_ENUM_MEMBER = 4;
}

message StorefrontAccount {
  string email = 1;
  string first_name = 2;
  string last_name = 3;
  google.type.Date birth_date = 4;
  ShoppingPreferenceEnum shopping_preference = 5;
  string phone = 6;
  bool subscribe_newsletter = 7;
  bool subscribe_new_arrivals = 8;
  bool subscribe_events = 9;
  AccountTierEnum account_tier = 10;
  repeated StorefrontSavedAddress addresses = 11;
  string default_country = 12;
  string default_language = 13;
}

message GetAccountRequest {}

message GetAccountResponse {
  StorefrontAccount account = 1;
}

message UpdateAccountRequest {
  optional string first_name = 1;
  optional string last_name = 2;
  optional google.type.Date birth_date = 3;
  optional ShoppingPreferenceEnum shopping_preference = 4;
  optional string phone = 5;
  optional bool subscribe_newsletter = 6;
  optional bool subscribe_new_arrivals = 7;
  optional bool subscribe_events = 8;
  optional string default_country = 9;
  optional string default_language = 10;
}

message UpdateAccountResponse {
  StorefrontAccount account = 1;
}

message StorefrontSavedAddress {
  int32 id = 1;
  string label = 2;
  string country = 3;
  string state = 4;
  string city = 5;
  string address_line_one = 6;
  string address_line_two = 7;
  string company = 8;
  string postal_code = 9;
  bool is_default = 10;
}

message ListSavedAddressesRequest {}

message ListSavedAddressesResponse {
  repeated StorefrontSavedAddress addresses = 1;
}

message AddSavedAddressRequest {
  StorefrontSavedAddress address = 1;
}

message AddSavedAddressResponse {
  int32 id = 1;
}

message UpdateSavedAddressRequest {
  int32 id = 1;
  StorefrontSavedAddress address = 2;
}

message UpdateSavedAddressResponse {}

message DeleteSavedAddressRequest {
  int32 id = 1;
}

message DeleteSavedAddressResponse {}

message SetDefaultSavedAddressRequest {
  int32 id = 1;
}

message SetDefaultSavedAddressResponse {}

message ListMyOrdersRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListMyOrdersResponse {
  repeated common.OrderFull orders = 1;
  int32 total = 2;
}
